# Lighthouse CI: enforces performance budgets on every PR touching web code.
#
# Hard gates (block merge): total-byte-weight, resource-summary:script:size
# Soft warnings (surface only): FCP, LCP, TBT, Speed Index
#
# Thresholds calibrated from 10 baseline runs on main.
# To recalibrate after perf changes: ./tests/lighthouse/calibrate.sh

name: Lighthouse CI

on:
  pull_request:
    paths:
      - 'internal/web/**'
      - '.lighthouserc.json'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Performance Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build agent-deck
        env:
          GOTOOLCHAIN: go1.24.0
        run: make build

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
