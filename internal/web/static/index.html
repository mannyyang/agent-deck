<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1b26" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Agent Deck" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/static/icons/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/icons/logo.svg" />
    <title>Agent Deck</title>

    <!-- 1. Theme init (synchronous, prevents flash of wrong theme).
         This script drives the @variant dark (&:where(.dark, .dark *))
         override in styles.src.css — do NOT remove or reorder. -->
    <script>
      ;(function() {
        var t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- 2. Chart.js UMD (sets window.Chart, must load before ES modules).
         PERF-B: defer attribute so the 206 KB script is fetched in parallel
         with HTML parsing and executed just before DOMContentLoaded, instead
         of blocking the parser. window.Chart is still set before the Preact
         app's first useEffect runs, so the cost dashboard still picks it up. -->
    <script src="/static/chart.umd.min.js" defer></script>

    <!-- 3. Import map: single Preact instance via bare specifiers -->
    <script type="importmap">
    {
      "imports": {
        "preact":          "/static/vendor/preact.mjs",
        "preact/hooks":    "/static/vendor/preact-hooks.mjs",
        "htm/preact":      "/static/vendor/htm.mjs",
        "@preact/signals": "/static/vendor/signals.mjs",
        "@xterm/xterm":       "/static/vendor/xterm.mjs",
        "@xterm/addon-fit":   "/static/vendor/addon-fit.mjs",
        "@xterm/addon-webgl": "/static/vendor/addon-webgl.mjs"
      }
    }
    </script>

    <!-- 4. Preact app entry (module, deferred by default).
         PERF-H: {{ASSET:app/main.js}} is resolved at serve-time by
         assets.SubstitutePlaceholders. In dev mode (no manifest) it
         resolves to /static/app/main.js; in prod mode it resolves to
         /static/dist/main.[hash].js from the bundler manifest. The
         on-disk file stays hand-written with the placeholder so
         bundling never makes the tree dirty. -->
    <script type="module" src="{{ASSET:app/main.js}}"></script>

    <!-- 5. Stylesheets — LAST in <head> to win the cascade.
         styles.css is the compiled Tailwind v4 output (see internal/web/static_files.go
         //go:generate directive). It MUST load AFTER xterm.css so utility classes
         take precedence over vendor overrides. Preserving this order matches the
         cascade-order baseline captured in tests/e2e/baselines/cascade-order.json. -->
    <link rel="stylesheet" href="/static/vendor/xterm.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="bg-gray-100 dark:bg-tn-bg text-gray-900 dark:text-tn-fg min-h-screen">
    <!-- Preact app mounts here -->
    <div id="app-root" class="min-h-screen"></div>
  </body>
</html>
